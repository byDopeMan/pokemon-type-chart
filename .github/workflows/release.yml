name: 🚀 Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release-Tag (z.B. v1.2.0)"
        required: true
        default: "v1.0.0"

jobs:
  release:
    name: 📦 Release erstellen
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tag-Name bestimmen
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: ZIP erstellen
        run: |
          cp docs/index.html PokemonTypeChart.html
          zip PokemonTypeChart-${{ steps.tag.outputs.TAG }}.zip PokemonTypeChart.html

      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: "Pokémon Type Chart ${{ steps.tag.outputs.TAG }}"
          body: |
            ## 📦 Download

            **`PokemonTypeChart-${{ steps.tag.outputs.TAG }}.zip`** – entpacken und `PokemonTypeChart.html` im Browser öffnen. Fertig.

            Keine Installation, keine Runtime, keine Internetverbindung nötig.
          files: PokemonTypeChart-${{ steps.tag.outputs.TAG }}.zip
